name: Auto label issues

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const text = `${context.payload.issue.title}\n${context.payload.issue.body || ''}`.toLowerCase();
            const labelsToEnsure = [];
            if (text.includes('error')) labelsToEnsure.push('bug');
            if (text.includes('add')) labelsToEnsure.push('feature');
            if (labelsToEnsure.length === 0) { core.info('No labels to apply'); return; }
            for (const name of labelsToEnsure) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name, color: name === 'bug' ? 'd73a4a' : 'a2eeef' });
                } else throw e;
              }
            }
            await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, labels: labelsToEnsure });